<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Simon Orb Memory 95</title><meta name="description" content="Pattern game in robot carnival"><style>body{margin:0;background:#090e22;color:white;font-family:Arial;display:grid;place-items:center;height:100vh}.box{text-align:center}.orbs{display:grid;grid-template-columns:repeat(2,160px);gap:18px}.orb{height:160px;border-radius:50%;border:0;font-size:40px;filter:brightness(.65)}.lit{filter:brightness(1.8);box-shadow:0 0 45px white}button{cursor:pointer}</style></head><body><div class=box><h1>Simon Orb Memory 95</h1><h2>Level <span id=l>1</span></h2><div class=orbs id=o></div><p>Repeat the glowing pattern.</p></div><script>let colors=['#8be9fd','#ffb86c','#ff5d73','#b197fc'],seq=[],pos=0,playing=false;colors.forEach((col,i)=>{let b=document.createElement('button');b.className='orb';b.style.background=col;b.onclick=()=>press(i);o.appendChild(b)});let bs=[...document.querySelectorAll('.orb')];function flash(i){bs[i].classList.add('lit');setTimeout(()=>bs[i].classList.remove('lit'),350)}function next(){seq.push(Math.floor(Math.random()*4));pos=0;l.textContent=seq.length;playing=true;seq.forEach((n,i)=>setTimeout(()=>flash(n),600+i*520));setTimeout(()=>playing=false,700+seq.length*520)}function press(i){if(playing)return;flash(i);if(i!==seq[pos]){alert('Wrong! reached '+seq.length);seq=[];next();return}pos++;if(pos===seq.length)setTimeout(next,600)}next()</script></body></html>
