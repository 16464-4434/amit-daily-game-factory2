<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Basket Arc Challenge 91</title><meta name="description" content="Sports game in tiny city"><style>body{margin:0;background:#ffe3bd;font-family:Arial;overflow:hidden}canvas{width:100vw;height:100vh;display:block}.hud{position:fixed;top:12px;left:12px;background:white;padding:12px;border-radius:14px;font-weight:900}</style></head><body><div class=hud>Basket Arc Challenge 91 Score <span id=s>0</span></div><canvas id=cv></canvas><script>const x=cv.getContext('2d');let W,H,ball={x:90,y:0,vx:0,vy:0},score=0;function size(){W=cv.width=innerWidth;H=cv.height=innerHeight;ball={x:90,y:H-90,vx:0,vy:0}}onresize=size;size();onclick=e=>{ball.vx=(e.clientX-ball.x)/22;ball.vy=(e.clientY-ball.y)/22};function loop(){x.fillStyle='#ffd6a3';x.fillRect(0,0,W,H);let rim={x:W-120,y:160};x.strokeStyle='#c33';x.lineWidth=8;x.beginPath();x.arc(rim.x,rim.y,38,0,Math.PI);x.stroke();ball.vy+=.35;ball.x+=ball.vx;ball.y+=ball.vy;if(ball.y>H-20){ball.y=H-20;ball.vy*=-.55;ball.vx*=.86}x.fillStyle='#f97316';x.beginPath();x.arc(ball.x,ball.y,22,0,7);x.fill();if(Math.abs(ball.x-rim.x)<34&&Math.abs(ball.y-rim.y)<20&&ball.vy>0){score++;s.textContent=score;size()}requestAnimationFrame(loop)}loop()</script></body></html>
