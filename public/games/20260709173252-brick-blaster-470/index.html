<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Brick Blaster Arena 20</title><meta name="description" content="Breakout game in crystal cave"><style>body{margin:0;background:#111;color:white;font-family:Arial}canvas{display:block;margin:auto;max-width:100vw;height:100vh;background:linear-gradient(#20113b,#070712)}</style></head><body><canvas id=cv width=900 height=700></canvas><script>const x=cv.getContext('2d');let p={x:380,y:650,w:140,h:18},b={x:450,y:500,vx:4,vy:-5,r:10},score=0,br=[];for(let y=0;y<5;y++)for(let i=0;i<10;i++)br.push({x:35+i*82,y:55+y*38,w:70,h:25});onmousemove=e=>p.x=e.clientX/cv.getBoundingClientRect().width*900-p.w/2;onkeydown=e=>{if(e.key==='ArrowLeft')p.x-=40;if(e.key==='ArrowRight')p.x+=40};function loop(){x.clearRect(0,0,900,700);x.fillStyle='#8be9fd';br.forEach(r=>x.fillRect(r.x,r.y,r.w,r.h));x.fillStyle='#ffb86c';x.fillRect(p.x,p.y,p.w,p.h);x.beginPath();x.arc(b.x,b.y,b.r,0,7);x.fillStyle='#fff';x.fill();b.x+=b.vx;b.y+=b.vy;if(b.x<10||b.x>890)b.vx*=-1;if(b.y<10)b.vy*=-1;if(b.y>700){b.x=450;b.y=500;score=0}if(b.x>p.x&&b.x<p.x+p.w&&b.y+b.r>p.y)b.vy=-Math.abs(b.vy);br=br.filter(r=>{let hit=b.x>r.x&&b.x<r.x+r.w&&b.y>r.y&&b.y<r.y+r.h;if(hit){b.vy*=-1;score+=10}return !hit});x.font='26px Arial';x.fillText('Brick Blaster Arena 20 Score '+score,25,35);requestAnimationFrame(loop)}loop()</script></body></html>
