<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Fishing Timing Dock 92</title><meta name="description" content="Fishing game in crystal cave"><style>body{margin:0;background:linear-gradient(#8ad7ff 0 45%,#086788 45%);font-family:Arial;text-align:center;color:#052}.dock{font-size:120px;margin-top:80px}.meter{width:min(80vw,700px);height:50px;background:white;border-radius:999px;margin:30px auto;position:relative}.zone{position:absolute;height:100%;width:90px;background:#ffb86c;border-radius:999px;left:50%}.hook{position:absolute;top:-10px;width:16px;height:70px;background:#8be9fd;border-radius:9px}button{font-size:28px;border:0;border-radius:18px;padding:16px 32px;background:#ffb86c;font-weight:900}</style></head><body><h1>Fishing Timing Dock 92</h1><h2>Fish <span id=s>0</span></h2><div class=dock>🎣</div><div class=meter id=m><div class=zone></div><div class=hook id=h></div></div><button onclick="catchFish()">Catch!</button><script>let x=0,v=4,score=0;function loop(){x+=v;if(x<0||x>m.clientWidth-16)v*=-1;h.style.left=x+'px';requestAnimationFrame(loop)}function catchFish(){let z=m.clientWidth/2;if(Math.abs(x-z)<65){score++;s.textContent=score}else score=Math.max(0,score-1)}loop()</script></body></html>
