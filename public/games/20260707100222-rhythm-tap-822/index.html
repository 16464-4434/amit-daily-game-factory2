<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Beat Tap Studio 12</title><meta name="description" content="Rhythm game in moon desert"><style>body{margin:0;background:#12051d;color:white;font-family:Arial;text-align:center}.lane{height:70vh;display:flex;align-items:end;justify-content:center;gap:20px}.beat{width:90px;height:90px;border-radius:50%;background:#7cffcb;display:grid;place-items:center;font-size:30px;font-weight:900;transform:translateY(-70vh)}.target{position:fixed;bottom:80px;left:0;right:0;font-size:70px}button{font-size:26px;padding:15px 30px;border-radius:18px;border:0;background:#ff7b7b;font-weight:900}</style></head><body><h1>Beat Tap Studio 12</h1><h2>Score <span id=s>0</span></h2><div class=lane id=lane></div><div class=target>🥁</div><button onclick="tap()">TAP / Space</button><script>let beats=[],score=0;function spawn(){let b=document.createElement('div');b.className='beat';b.textContent='●';b.y=-innerHeight*.7;lane.appendChild(b);beats.push(b)}setInterval(spawn,900);function tap(){let best=beats[0];if(!best)return;let pos=best.getBoundingClientRect().bottom;let target=innerHeight-80;if(Math.abs(pos-target)<80){score+=10;best.remove();beats.shift()}else score=Math.max(0,score-3);s.textContent=score}onkeydown=e=>{if(e.code==='Space')tap()};function loop(){beats.forEach(b=>{b.y+=5;b.style.transform='translateY('+b.y+'px)'});beats=beats.filter(b=>{if(b.y>innerHeight){b.remove();return false}return true});requestAnimationFrame(loop)}loop()</script></body></html>
