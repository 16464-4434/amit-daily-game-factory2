<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Paddle Duel Galaxy 39</title><meta name="description" content="Pong game in laser aquarium"><style>body{margin:0;background:#000;color:white;font-family:Arial;overflow:hidden}canvas{display:block;width:100vw;height:100vh}.label{position:fixed;top:12px;left:12px;font-size:22px;font-weight:900}</style></head><body><div class=label>Paddle Duel Galaxy 39 <span id=s>0</span></div><canvas id=cv></canvas><script>const x=cv.getContext('2d');let W,H,p=0,ai=0,b,score=0;function size(){W=cv.width=innerWidth;H=cv.height=innerHeight;p=H/2;ai=H/2;b={x:W/2,y:H/2,vx:5,vy:3}}onresize=size;size();onmousemove=e=>p=e.clientY;onkeydown=e=>{if(e.key==='ArrowUp')p-=50;if(e.key==='ArrowDown')p+=50};function loop(){x.fillStyle='#000';x.fillRect(0,0,W,H);b.x+=b.vx;b.y+=b.vy;ai+=(b.y-ai)*.06;if(b.y<0||b.y>H)b.vy*=-1;if(b.x<30&&Math.abs(b.y-p)<70){b.vx=Math.abs(b.vx)+.2;score++;s.textContent=score}if(b.x>W-30&&Math.abs(b.y-ai)<70)b.vx=-Math.abs(b.vx)-.2;if(b.x<0||b.x>W)size();x.fillStyle='#7cffcb';x.fillRect(18,p-70,18,140);x.fillStyle='#ff7b7b';x.fillRect(W-36,ai-70,18,140);x.fillStyle='#fff';x.beginPath();x.arc(b.x,b.y,12,0,7);x.fill();requestAnimationFrame(loop)}loop()</script></body></html>
