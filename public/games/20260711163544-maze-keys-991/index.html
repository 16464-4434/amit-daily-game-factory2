<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Maze Keys Escape 91</title><meta name="description" content="Maze game in jungle subway"><style>body{margin:0;background:#07131d;color:white;font-family:Arial;display:grid;place-items:center;height:100vh}.m{font-size:28px}.grid{display:grid;grid-template-columns:repeat(12,42px);gap:4px}.cell{width:42px;height:42px;background:#112}.wall{background:#7cffcb}.p{background:#fff}.k{background:#ff7b7b}.e{background:#5f5}</style></head><body><div><h1>Maze Keys Escape 91</h1><p class=m>Keys <span id=ks>0</span>/3</p><div class=grid id=g></div></div><script>let map=['############','#P....#....#','#.##..#.##.#','#..#..#..#K#','##.#.##..#.#','#..#...#...#','#.####.#.#.#','#....K.#.#.#','#.##.###.#.#','#......#...#','#K####...#E#','############'];let px=1,py=1,keys=0;function draw(){g.innerHTML='';map.forEach((row,y)=>[...row].forEach((ch,x)=>{let d=document.createElement('div');d.className='cell '+(ch==='#'?'wall':ch==='K'?'k':ch==='E'?'e':'');if(x===px&&y===py)d.className='cell p';g.appendChild(d)}));ks.textContent=keys}function move(dx,dy){let nx=px+dx,ny=py+dy,ch=map[ny][nx];if(ch==='#')return;px=nx;py=ny;if(ch==='K'){keys++;map[ny]=map[ny].slice(0,nx)+'.'+map[ny].slice(nx+1)}if(ch==='E'&&keys>=3)alert('Escaped!');draw()}onkeydown=e=>{if(e.key==='ArrowLeft')move(-1,0);if(e.key==='ArrowRight')move(1,0);if(e.key==='ArrowUp')move(0,-1);if(e.key==='ArrowDown')move(0,1)};draw()</script></body></html>
