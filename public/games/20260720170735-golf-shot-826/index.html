<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Mini Golf Shot 16</title><meta name="description" content="Aim game in candy volcano"><style>body{margin:0;background:#184d2b;color:white;font-family:Arial;overflow:hidden}canvas{width:100vw;height:100vh;display:block}.ui{position:fixed;top:18px;left:18px;background:#0008;padding:14px;border-radius:16px;font-weight:900}</style></head><body><div class=ui>Mini Golf Shot 16 · drag/click to shoot · Shots <span id=s>0</span></div><canvas id=cv></canvas><script>const x=cv.getContext('2d');let W,H,ball,hole,shots=0;function size(){W=cv.width=innerWidth;H=cv.height=innerHeight;ball={x:80,y:H-90,vx:0,vy:0};hole={x:W-90,y:90,r:25}}onresize=size;size();onclick=e=>{ball.vx=(e.clientX-ball.x)/18;ball.vy=(e.clientY-ball.y)/18;shots++;s.textContent=shots};function loop(){x.fillStyle='#1b7b43';x.fillRect(0,0,W,H);x.fillStyle='#111';x.beginPath();x.arc(hole.x,hole.y,hole.r,0,7);x.fill();ball.x+=ball.vx;ball.y+=ball.vy;ball.vx*=.985;ball.vy*=.985;if(ball.x<15||ball.x>W-15)ball.vx*=-.8;if(ball.y<15||ball.y>H-15)ball.vy*=-.8;x.fillStyle='#fff';x.beginPath();x.arc(ball.x,ball.y,14,0,7);x.fill();if(Math.hypot(ball.x-hole.x,ball.y-hole.y)<hole.r){alert('Hole in '+shots);size();shots=0;s.textContent=0}requestAnimationFrame(loop)}loop()</script></body></html>
