<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>One Button Cloud Flight 93</title><meta name="description" content="Flying game in space bakery"><style>body{margin:0;background:#84d9ff;font-family:Arial;overflow:hidden}canvas{display:block;width:100vw;height:100vh}.tip{position:fixed;top:12px;left:12px;background:white;border-radius:14px;padding:10px 14px;font-weight:900}</style></head><body><div class=tip>One Button Cloud Flight 93 · click/space to flap · <span id=s>0</span></div><canvas id=cv></canvas><script>const cva=cv,ctx=cva.getContext('2d');let W,H,bird,pipes,score,vy,run=true;function R(){W=cva.width=innerWidth;H=cva.height=innerHeight}onresize=R;R();function reset(){bird={x:W*.25,y:H/2};vy=0;pipes=[];score=0}function flap(){vy=-8}onclick=flap;onkeydown=e=>{if(e.code==='Space')flap()};function loop(){ctx.fillStyle='#79d8ff';ctx.fillRect(0,0,W,H);vy+=.45;bird.y+=vy;if(!pipes.length||pipes[pipes.length-1].x<W-280){let gap=170,top=80+Math.random()*(H-320);pipes.push({x:W,top,gap,pass:false})}pipes.forEach(p=>{p.x-=3;ctx.fillStyle='#8be9fd';ctx.fillRect(p.x,0,70,p.top);ctx.fillRect(p.x,p.top+p.gap,70,H);if(!p.pass&&p.x<bird.x){p.pass=true;score++;s.textContent=score}if(bird.x+18>p.x&&bird.x-18<p.x+70&&(bird.y-18<p.top||bird.y+18>p.top+p.gap))reset()});pipes=pipes.filter(p=>p.x>-90);ctx.fillStyle='#ffb86c';ctx.beginPath();ctx.arc(bird.x,bird.y,20,0,7);ctx.fill();if(bird.y<0||bird.y>H)reset();requestAnimationFrame(loop)}reset();loop()</script></body></html>
