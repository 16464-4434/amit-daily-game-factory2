<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Flip Card Monster Match 33</title><meta name="description" content="Memory game in laser aquarium"><style>body{margin:0;min-height:100vh;background:radial-gradient(circle,#a78bfa,#08111f 55%);font-family:Verdana;color:white;display:grid;place-items:center}.panel{width:min(900px,94vw);background:#0008;border-radius:28px;padding:22px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.card{height:110px;border-radius:18px;background:#111;display:grid;place-items:center;font-size:44px;cursor:pointer;box-shadow:inset 0 0 0 3px #fff2}.open{background:#facc15;color:#111}h1{margin-top:0}.score{font-size:24px;font-weight:900}</style></head><body><main class=panel><h1>Flip Card Monster Match 33</h1><p>Flip cards and find pairs. World: laser aquarium</p><div class=score>Moves <span id=m>0</span> · Pairs <span id=p>0</span>/8</div><div class=grid id=grid></div></main><script>const icons='🐸 🚀 🍕 👾 🐙 🧊 🎧 🏆'.split(' ');let vals=[...icons,...icons].sort(()=>Math.random()-.5),first=null,moves=0,pairs=0;vals.forEach((v,i)=>{let e=document.createElement('button');e.className='card';e.dataset.v=v;e.textContent='?';e.onclick=()=>flip(e);grid.appendChild(e)});function flip(e){if(e.classList.contains('open')||e.done)return;e.classList.add('open');e.textContent=e.dataset.v;if(!first){first=e;return}moves++;m.textContent=moves;if(first.dataset.v===e.dataset.v){first.done=e.done=true;pairs++;p.textContent=pairs;if(pairs===8)setTimeout(()=>alert('You win in '+moves+' moves'),200)}else{let a=first;setTimeout(()=>{a.classList.remove('open');e.classList.remove('open');a.textContent=e.textContent='?'},650)}first=null}</script></body></html>
