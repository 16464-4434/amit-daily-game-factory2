<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Avoid Arena Swarm 29</title><meta name="description" content="Survival game in cloud factory"><style>body{margin:0;background:#101022;color:white;font-family:Arial;overflow:hidden}canvas{width:100vw;height:100vh;display:block}.hud{position:fixed;top:15px;right:15px;font-size:24px;font-weight:900}</style></head><body><div class=hud>Avoid Arena Swarm 29 Time <span id=s>0</span></div><canvas id=cv></canvas><script>const x=cv.getContext('2d');let W,H,p,en=[],score=0;function size(){W=cv.width=innerWidth;H=cv.height=innerHeight;p={x:W/2,y:H/2}}onresize=size;size();onmousemove=e=>{p.x=e.clientX;p.y=e.clientY};setInterval(()=>en.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*5,vy:(Math.random()-.5)*5}),800);function loop(){score++;s.textContent=Math.floor(score/60);x.fillStyle='#101022';x.fillRect(0,0,W,H);x.fillStyle='#8be9fd';x.beginPath();x.arc(p.x,p.y,18,0,7);x.fill();en.forEach(e=>{e.x+=e.vx;e.y+=e.vy;if(e.x<0||e.x>W)e.vx*=-1;if(e.y<0||e.y>H)e.vy*=-1;x.fillStyle='#ffb86c';x.beginPath();x.arc(e.x,e.y,24,0,7);x.fill();if(Math.hypot(p.x-e.x,p.y-e.y)<42){alert('Survived '+Math.floor(score/60)+' seconds');en=[];score=0}});requestAnimationFrame(loop)}loop()</script></body></html>
