<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Stack Tower Builder 26</title><meta name="description" content="Timing game in crystal cave"><style>body{margin:0;background:#07101c;color:white;font-family:Arial;overflow:hidden}canvas{width:100vw;height:100vh;display:block}.h{position:fixed;top:20px;left:20px;font-size:28px;font-weight:900}</style></head><body><div class=h>Stack Tower Builder 26 Height <span id=s>0</span></div><canvas id=cv></canvas><script>const x=cv.getContext('2d');let W,H,blocks=[],move,dir=1,score=0;function size(){W=cv.width=innerWidth;H=cv.height=innerHeight;blocks=[{x:W/2-120,y:H-60,w:240,h:30}];newBlock()}onresize=size;size();function newBlock(){let last=blocks[blocks.length-1];move={x:0,y:last.y-32,w:last.w,h:30}}function drop(){let last=blocks[blocks.length-1];let overlap=Math.max(0,Math.min(move.x+move.w,last.x+last.w)-Math.max(move.x,last.x));if(overlap<20){alert('Tower '+score);size();score=0;return}move.w=overlap;move.x=Math.max(move.x,last.x);blocks.push(move);score++;s.textContent=score;newBlock()}onclick=drop;onkeydown=e=>{if(e.code==='Space')drop()};function loop(){x.fillStyle='#0b1020';x.fillRect(0,0,W,H);move.x+=dir*5;if(move.x<0||move.x+move.w>W)dir*=-1;let camera=Math.max(0,blocks[blocks.length-1].y-H*.5);[...blocks,move].forEach((b,i)=>{x.fillStyle=i%2?'#61f4ff':'#ffe36e';x.fillRect(b.x,b.y+camera,b.w,b.h)});requestAnimationFrame(loop)}loop()</script></body></html>
