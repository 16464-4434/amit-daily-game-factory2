<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Neon Lane Racer 16</title><meta name="description" content="Racing game in ice cream planet"><style>body{margin:0;background:#050508;color:#fff;font-family:Arial;overflow:hidden}canvas{width:100vw;height:100vh;display:block}.hud{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#0009;padding:12px 22px;border-radius:999px;font-size:22px;font-weight:900}</style></head><body><div class=hud>Neon Lane Racer 16 · Score <span id=s>0</span></div><canvas id=cv></canvas><script>const x=cv.getContext('2d');let W,H,lane=1,cars=[],score=0;function size(){W=cv.width=innerWidth;H=cv.height=innerHeight}onresize=size;size();function add(){cars.push({lane:Math.floor(Math.random()*3),y:-120})}setInterval(add,650);onkeydown=e=>{if(e.key==='ArrowLeft')lane=Math.max(0,lane-1);if(e.key==='ArrowRight')lane=Math.min(2,lane+1)};onclick=e=>{lane=e.clientX<W/2?Math.max(0,lane-1):Math.min(2,lane+1)};function loop(){x.fillStyle='#06060d';x.fillRect(0,0,W,H);let lw=W/3;for(let i=1;i<3;i++){x.strokeStyle='#8be9fd';x.setLineDash([25,25]);x.lineWidth=4;x.beginPath();x.moveTo(i*lw,0);x.lineTo(i*lw,H);x.stroke()}cars.forEach(o=>{o.y+=5+score*.02;x.fillStyle='#ffb86c';x.fillRect(o.lane*lw+lw*.25,o.y,lw*.5,90);if(o.y>H){o.dead=true;score++;s.textContent=score}if(o.lane===lane&&o.y>H-170&&o.y<H-40){score=0;s.textContent=0;cars=[]}});cars=cars.filter(o=>!o.dead);x.fillStyle='#fff';x.fillRect(lane*lw+lw*.22,H-135,lw*.56,100);requestAnimationFrame(loop)}loop()</script></body></html>
