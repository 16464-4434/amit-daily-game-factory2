<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Grid Snake Lab 12</title><meta name="description" content="Snake game in moon desert"><style>body{margin:0;background:#08111f;color:white;font-family:monospace;display:grid;place-items:center;min-height:100vh}.box{width:min(92vw,680px);text-align:center}canvas{background:#07121f;border:12px solid #a78bfa;box-shadow:0 0 40px #a78bfa;width:100%;aspect-ratio:1;border-radius:24px}.bar{display:flex;justify-content:space-between;font-size:24px;margin:12px}.pad button{font-size:30px;margin:6px;border:0;border-radius:16px;padding:12px 22px;background:#facc15;font-weight:900}</style></head><body><div class="box"><h1>Grid Snake Lab 12</h1><p>Different game type: Snake. World: moon desert.</p><div class="bar"><b>Score <span id=s>0</span></b><b id=m>eat 12 orbs</b></div><canvas id=g width=600 height=600></canvas><div class=pad><button id=l>◀</button><button id=u>▲</button><button id=r>▶</button><button id=d>▼</button></div></div><script>const C=document.getElementById('g'),x=C.getContext('2d'),s=document.getElementById('s'),N=20,Z=30;let snake,food,dir,next,score,over=false;function reset(){snake=[[9,9],[8,9],[7,9]];food=[15,12];dir=[1,0];next=[1,0];score=0;over=false;s.textContent=0}function place(){food=[Math.floor(Math.random()*N),Math.floor(Math.random()*N)]}function draw(){x.fillStyle='#050b12';x.fillRect(0,0,600,600);x.strokeStyle='rgba(255,255,255,.08)';for(let i=0;i<=N;i++){x.beginPath();x.moveTo(i*Z,0);x.lineTo(i*Z,600);x.moveTo(0,i*Z);x.lineTo(600,i*Z);x.stroke()}x.fillStyle='#facc15';x.fillRect(food[0]*Z+5,food[1]*Z+5,20,20);snake.forEach((p,i)=>{x.fillStyle=i?'#a78bfa':'#fff';x.fillRect(p[0]*Z+3,p[1]*Z+3,24,24)});if(over){x.fillStyle='#fff';x.font='46px monospace';x.fillText('Game Over',175,300)}}function step(){if(over)return;dir=next;let h=[snake[0][0]+dir[0],snake[0][1]+dir[1]];if(h[0]<0||h[1]<0||h[0]>=N||h[1]>=N||snake.some(p=>p[0]===h[0]&&p[1]===h[1]))over=true;snake.unshift(h);if(h[0]===food[0]&&h[1]===food[1]){score++;s.textContent=score;place();if(score>=12)document.getElementById('m').textContent='YOU WIN'}else snake.pop();draw()}function turn(a,b){if(dir[0]!==-a||dir[1]!==-b)next=[a,b]}onkeydown=e=>{if(e.key==='ArrowLeft')turn(-1,0);if(e.key==='ArrowRight')turn(1,0);if(e.key==='ArrowUp')turn(0,-1);if(e.key==='ArrowDown')turn(0,1)};l.onclick=()=>turn(-1,0);r.onclick=()=>turn(1,0);u.onclick=()=>turn(0,-1);d.onclick=()=>turn(0,1);reset();draw();setInterval(step,130)</script></body></html>
