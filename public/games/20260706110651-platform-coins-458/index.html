<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Coin Cave Platformer 98</title><meta name="description" content="Platformer game in crystal cave"><style>body{margin:0;background:#0a1220;color:white;font-family:Arial}canvas{display:block;width:100vw;height:100vh}.hud{position:fixed;top:18px;left:18px;font-size:24px;font-weight:900}</style></head><body><div class=hud>Coin Cave Platformer 98 Coins <span id=s>0</span></div><canvas id=cv></canvas><script>const x=cv.getContext('2d');let W,H,p,vy=0,coins,score=0;function size(){W=cv.width=innerWidth;H=cv.height=innerHeight;p={x:60,y:H-90,w:32,h:48};coins=[200,380,560,740,920].map((xx,i)=>({x:xx,y:H-150-i%2*80}))}onresize=size;size();let key={};onkeydown=e=>key[e.key]=true;onkeyup=e=>key[e.key]=false;function loop(){x.fillStyle='#0b1020';x.fillRect(0,0,W,H);let ground=H-40;if(key.ArrowLeft)p.x-=5;if(key.ArrowRight)p.x+=5;if((key.ArrowUp||key[' '])&&p.y+p.h>=ground)vy=-13;vy+=.55;p.y+=vy;if(p.y+p.h>ground){p.y=ground-p.h;vy=0}x.fillStyle='#61f4ff';x.fillRect(0,ground,W,40);x.fillStyle='white';x.fillRect(p.x,p.y,p.w,p.h);coins.forEach(cn=>{x.fillStyle='#ffe36e';x.beginPath();x.arc(cn.x,cn.y,14,0,7);x.fill();if(Math.abs(p.x-cn.x)<35&&Math.abs(p.y-cn.y)<55){cn.got=true;score++;s.textContent=score}});coins=coins.filter(c=>!c.got);if(coins.length===0){alert('All coins!');size();score=0;s.textContent=0}requestAnimationFrame(loop)}loop()</script></body></html>
