<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Whack The Light Bugs 66</title><meta name="description" content="Reaction game in haunted arcade"><style>body{margin:0;background:#17091d;color:#fff;font-family:Arial;text-align:center}.holes{display:grid;grid-template-columns:repeat(3,minmax(90px,160px));gap:18px;justify-content:center;margin:20px}.hole{height:130px;border-radius:50%;background:#050505;border:8px solid #7cffcb;display:grid;place-items:center;font-size:70px;cursor:pointer}.on{background:#ff7b7b;box-shadow:0 0 30px #ff7b7b}h1{font-size:48px}.hud{font-size:26px;font-weight:900}</style></head><body><h1>Whack The Light Bugs 66</h1><p>Reaction game: hit the bug when it appears.</p><div class=hud>Score <span id=s>0</span> · Time <span id=t>30</span></div><div class=holes id=h></div><script>let score=0,time=30,active=-1;for(let i=0;i<9;i++){let b=document.createElement('button');b.className='hole';b.textContent='';b.onclick=()=>{if(i===active){score++;s.textContent=score;hide()}else score=Math.max(0,score-1);};h.appendChild(b)}let holes=[...document.querySelectorAll('.hole')];function hide(){holes.forEach(x=>{x.classList.remove('on');x.textContent=''})}function show(){hide();active=Math.floor(Math.random()*9);holes[active].classList.add('on');holes[active].textContent='🪲'}setInterval(show,700);let timer=setInterval(()=>{time--;t.textContent=time;if(time<=0){clearInterval(timer);alert('Finished: '+score)}},1000)</script></body></html>
