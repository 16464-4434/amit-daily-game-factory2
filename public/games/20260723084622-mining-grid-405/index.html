<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Treasure Mine Clicker 45</title><meta name="description" content="Mining game in laser aquarium"><style>body{margin:0;background:#2b1607;color:#ffe;font-family:Georgia;text-align:center}.grid{display:grid;grid-template-columns:repeat(8,70px);gap:8px;justify-content:center}.rock{height:70px;border-radius:12px;border:0;background:#5a3924;font-size:30px}.gold{background:#6ef7b2}h1{font-size:42px}</style></head><body><h1>Treasure Mine Clicker 45</h1><h2>Gold <span id=s>0</span>/12</h2><div class=grid id=g></div><script>let score=0;for(let i=0;i<64;i++){let b=document.createElement('button');b.className='rock';b.textContent='🪨';b.gold=Math.random()<.22;b.onclick=()=>{if(b.done)return;b.done=true;if(b.gold){b.className='rock gold';b.textContent='💰';score++;s.textContent=score;if(score>=12)alert('Mine cleared!')}else{b.textContent='🕳️';b.style.opacity=.55}};g.appendChild(b)}</script></body></html>
