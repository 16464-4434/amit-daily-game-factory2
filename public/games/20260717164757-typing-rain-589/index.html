<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Keyboard Rain Rescue 49</title><meta name="description" content="Typing game in tiny city"><style>body{margin:0;background:linear-gradient(#061021,#0b2836);color:white;font-family:Arial;overflow:hidden}.hud{position:fixed;inset:18px 18px auto;display:flex;justify-content:space-between;font-size:24px;font-weight:900}.letter{position:absolute;font-size:46px;font-weight:1000;color:#61f4ff;text-shadow:0 0 18px #61f4ff}.hero{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);font-size:80px}.start{position:fixed;inset:0;display:grid;place-items:center;background:#000a}.card{background:#111d2d;border:2px solid #ffe36e;border-radius:30px;padding:30px;text-align:center;max-width:600px}button{background:#ffe36e;border:0;border-radius:14px;padding:15px 25px;font-size:22px;font-weight:900}</style></head><body><div class=hud><span>Keyboard Rain Rescue 49</span><span>Score <b id=s>0</b> · Lives <b id=l>5</b></span></div><div class=hero>⌨️</div><div class=start id=start><div class=card><h1>Keyboard Rain Rescue</h1><p>Type the falling letters before they hit the keyboard. This is not an arcade template.</p><button onclick="go()">Start</button></div></div><script>let score=0,lives=5,items=[],run=false;const letters='ABCDEFGHJKLMNPQRSTUVWXYZ';function go(){start.style.display='none';run=true;setInterval(spawn,650);requestAnimationFrame(loop)}function spawn(){if(!run)return;let d=document.createElement('div');d.className='letter';d.textContent=letters[Math.floor(Math.random()*letters.length)];d.style.left=Math.random()*90+'vw';d.y=-50;document.body.appendChild(d);items.push(d)}function loop(){if(!run)return;for(const d of [...items]){d.y+=2+score*.015;d.style.top=d.y+'px';if(d.y>innerHeight-110){d.remove();items=items.filter(x=>x!==d);lives--;l.textContent=lives;if(lives<=0){run=false;alert('Game over. Score '+score)}}}requestAnimationFrame(loop)}onkeydown=e=>{let k=e.key.toUpperCase();let d=items.find(x=>x.textContent===k);if(d){d.remove();items=items.filter(x=>x!==d);score+=10;s.textContent=score}}</script></body></html>
