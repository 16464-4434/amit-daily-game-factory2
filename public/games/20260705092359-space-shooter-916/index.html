<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Tiny Space Defender 16</title><meta name="description" content="Shooter game in ice cream planet"><style>body{margin:0;background:#000;color:white;overflow:hidden;font-family:Arial}canvas{width:100vw;height:100vh;display:block}.hud{position:fixed;top:14px;left:14px;font-size:23px;font-weight:900}</style></head><body><div class=hud>Tiny Space Defender 16 Score <span id=s>0</span></div><canvas id=cv></canvas><script>const x=cv.getContext('2d');let W,H,ship,bul=[],en=[],score=0;function size(){W=cv.width=innerWidth;H=cv.height=innerHeight;ship={x:W/2,y:H-70}}onresize=size;size();onmousemove=e=>ship.x=e.clientX;onclick=()=>bul.push({x:ship.x,y:ship.y});onkeydown=e=>{if(e.key==='ArrowLeft')ship.x-=50;if(e.key==='ArrowRight')ship.x+=50;if(e.code==='Space')bul.push({x:ship.x,y:ship.y})};setInterval(()=>en.push({x:Math.random()*W,y:-30}),650);function loop(){x.fillStyle='#000';x.fillRect(0,0,W,H);x.fillStyle='#a78bfa';x.beginPath();x.moveTo(ship.x,ship.y-24);x.lineTo(ship.x-22,ship.y+24);x.lineTo(ship.x+22,ship.y+24);x.fill();bul.forEach(b=>{b.y-=9;x.fillStyle='#facc15';x.fillRect(b.x-3,b.y,6,20)});en.forEach(e=>{e.y+=3;x.fillStyle='#ff5d73';x.beginPath();x.arc(e.x,e.y,18,0,7);x.fill();bul.forEach(b=>{if(Math.hypot(b.x-e.x,b.y-e.y)<24){e.dead=b.dead=true;score+=10;s.textContent=score}});if(Math.hypot(ship.x-e.x,ship.y-e.y)<35){score=0;s.textContent=0;en=[]}});bul=bul.filter(b=>!b.dead&&b.y>-30);en=en.filter(e=>!e.dead&&e.y<H+50);requestAnimationFrame(loop)}loop()</script></body></html>
