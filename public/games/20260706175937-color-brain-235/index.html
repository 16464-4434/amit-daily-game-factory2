<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Color Brain Switch 55</title><meta name="description" content="Puzzle game in jungle subway"><style>body{margin:0;background:#0b1020;color:white;font-family:Arial;display:grid;place-items:center;min-height:100vh}.card{max-width:780px;text-align:center;background:#ffffff12;padding:34px;border-radius:30px}.word{font-size:80px;font-weight:1000}.btns{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}button{font-size:24px;border:0;border-radius:16px;padding:20px;font-weight:900}</style></head><body><div class=card><h1>Color Brain Switch 55</h1><p>Click the COLOR of the word, not the text.</p><div class=word id=w>RED</div><h2>Score <span id=s>0</span></h2><div class=btns id=b></div></div><script>const colors={RED:'#ff4d6d',BLUE:'#4dabff',GREEN:'#69db7c',YELLOW:'#ffd43b'};let score=0,answer='RED';Object.keys(colors).forEach(k=>{let bt=document.createElement('button');bt.textContent=k;bt.style.background=colors[k];bt.onclick=()=>{if(k===answer)score++;else score=Math.max(0,score-1);s.textContent=score;next()};b.appendChild(bt)});function next(){let names=Object.keys(colors);w.textContent=names[Math.floor(Math.random()*4)];answer=names[Math.floor(Math.random()*4)];w.style.color=colors[answer]}next()</script></body></html>
